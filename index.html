<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendEase – Sign In</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <script src="cloud-sync.js"></script>
    <script src="db.js"></script>
</head>

<body>
    <!-- Liquid glass background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <div class="login-wrapper">
        <div class="logo">
            <span class="logo-text">AttendEase</span>
        </div>

        <h1 class="title">Sign in</h1>

        <!-- Error banner (hidden by default) -->
        <div class="error-banner" id="errorBanner" hidden>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="errorMsg">Invalid username or password.</span>
        </div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <input type="text" id="identifier" placeholder="Username or Email" required autocomplete="username">
            </div>

            <div class="input-group password-group">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="button" class="toggle-password" aria-label="Toggle password visibility"
                    onclick="togglePassword()">
                    <svg class="eye-icon" id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Sign in</button>

            <div class="forgot-password">
                <a href="#">Forgot your password?</a>
            </div>
        </form>

        <p class="hint-text">
            Demo — <strong>admin</strong> / admin123 &nbsp;·&nbsp;
            <strong>ms.santos</strong> / teacher01 &nbsp;·&nbsp;
            <strong>juan.dc</strong> / pass1234
        </p>
    </div>

    <script>
        // Redirect already-logged-in users
        (async function () {
            await window.initCloudDb();
            const session = DB.getSession();
            if (session) {
                redirectByRole(session.role);
            }
        })();

        function handleLogin(e) {
            e.preventDefault();

            const identifier = document.getElementById('identifier').value.trim();
            const password   = document.getElementById('password').value;
            const btn        = document.getElementById('submitBtn');

            // Loading state
            btn.textContent = 'Signing in…';
            btn.disabled = true;
            hideError();

            // Small delay for UX feedback
            setTimeout(() => {
                const user = DB.authenticate(identifier, password);

                if (!user) {
                    showError('Invalid username / email or password. Please try again.');
                    btn.textContent = 'Sign in';
                    btn.disabled = false;
                    return;
                }

                DB.setSession(user);
                redirectByRole(user.role);
            }, 400);
        }

        function redirectByRole(role) {
            const destinations = {
                admin:   'adminPanel.html',
                teacher: 'teacherDashboard.html',
                student: 'studentDashboard.html',
            };
            window.location.href = destinations[role] || 'index.html';
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorBanner').hidden = false;
        }

        function hideError() {
            document.getElementById('errorBanner').hidden = true;
        }

        function togglePassword() {
            const input   = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            eyeIcon.innerHTML = isHidden
                ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
                : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        }
    </script>
</body>

</html>
